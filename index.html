<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }
  .container {
    background: #16213e;
    border-radius: 16px;
    width: 100%;
    max-width: 620px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #0f3460, #533483);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 42px; height: 42px;
    background: #e94560;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-info h2 { color: #fff; font-size: 16px; }
  .header-info span { color: #a8b2d8; font-size: 12px; }
  .online-dot {
    width: 8px; height: 8px;
    background: #4cff72;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  #chat {
    height: 460px;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #16213e;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: #16213e; }
  #chat::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
  .msg {
    padding: 10px 14px;
    border-radius: 14px;
    max-width: 78%;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .user {
    background: linear-gradient(135deg, #0f3460, #533483);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .bot {
    background: #0f3460;
    color: #e0e0e0;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .typing {
    background: #0f3460;
    color: #a8b2d8;
    align-self: flex-start;
    font-style: italic;
    font-size: 13px;
    border-bottom-left-radius: 4px;
  }
  .suggestions {
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: #16213e;
    border-top: 1px solid #0f3460;
  }
  .chip {
    background: #0f3460;
    color: #a8b2d8;
    border: 1px solid #533483;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { background: #533483; color: #fff; }
  .input-row {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    background: #0f3460;
    border-top: 1px solid #533483;
  }
  #userInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 24px;
    border: 1px solid #533483;
    background: #16213e;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
  }
  #userInput::placeholder { color: #555e8a; }
  #userInput:focus { border-color: #e94560; }
  #sendBtn {
    padding: 10px 18px;
    border: none;
    background: linear-gradient(135deg, #e94560, #533483);
    color: #fff;
    border-radius: 24px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: opacity 0.2s;
  }
  #sendBtn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h2>AI Chatbot</h2>
      <span><span class="online-dot"></span>Online &middot; No API &middot; Fully Free</span>
    </div>
  </div>

  <div id="chat">
    <div class="msg bot">👋 Hi! I am your AI Chatbot. I can answer hundreds of questions on health, coding, science, jokes, motivation and more!<br><br>Try the quick buttons below or just type anything!</div>
  </div>

  <div class="suggestions">
    <span class="chip" onclick="quickSend('Tell me a joke')">😄 Joke</span>
    <span class="chip" onclick="quickSend('Motivate me')">💪 Motivation</span>
    <span class="chip" onclick="quickSend('Health tips')">❤️ Health</span>
    <span class="chip" onclick="quickSend('Teach me coding')">💻 Coding</span>
    <span class="chip" onclick="quickSend('Fun fact')">🔥 Fun Fact</span>
    <span class="chip" onclick="quickSend('What time is it')">⏰ Time</span>
    <span class="chip" onclick="quickSend('Recommend a movie')">🎬 Movie</span>
    <span class="chip" onclick="quickSend('Travel tips')">✈️ Travel</span>
  </div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ask me anything..." autofocus />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const intents = [

  // GREETINGS
  { tag:"greeting", patterns:["hi","hello","hey","good morning","good evening","good afternoon","whats up","yo","howdy","sup","greetings","hiya"],
    responses:["Hello! How can I help you today? 😊","Hey there! What is on your mind?","Hi! I am ready to chat. Ask me anything!","Hey! Great to see you. What can I do for you?"] },

  { tag:"howareyou", patterns:["how are you","how are you doing","how do you do","you good","are you okay","hows it going","how is life","how do you feel"],
    responses:["I am doing great, thanks for asking! 😄","I am just a bot but feeling fantastic!","All good on my end! How about you?","Running perfectly! How can I help you today?"] },

  { tag:"goodbye", patterns:["bye","goodbye","see you","see ya","talk later","cya","later","farewell","good bye","take care"],
    responses:["Goodbye! Have a great day! 👋","See you later! Come back anytime!","Bye! Take care! 😊","Farewell! It was great chatting with you!"] },

  { tag:"thanks", patterns:["thanks","thank you","appreciate it","thx","thank u","much appreciated","ty","cheers","many thanks","grateful"],
    responses:["You are welcome! 😊","Anytime! Happy to help!","Glad I could help!","No problem at all! That is what I am here for!"] },

  { tag:"sorry", patterns:["sorry","my bad","i apologize","excuse me","pardon","forgive me","oops","my mistake"],
    responses:["No worries at all! 😊","It is totally fine!","No need to apologize, we are good!","Do not worry about it!"] },

  { tag:"yes", patterns:["yes","yep","yeah","yup","sure","of course","absolutely","definitely","ok","okay","alright","correct"],
    responses:["Great! What would you like to know?","Awesome! Let us continue! 😊","Perfect! Ask me anything!"] },

  { tag:"no", patterns:["no","nope","nah","not really","i dont think so","negative"],

  // ABOUT THE BOT
  { tag:"name", patterns:["what is your name","who are you","what should i call you","your name","whats your name","tell me your name","introduce yourself"],

  { tag:"howwork", patterns:["how do you work","how are you made","are you ai","are you a bot","are you real","how were you built","what are you","are you human","are you a robot"],

  { tag:"creator", patterns:["who made you","who created you","who built you","who is your creator","who programmed you","who designed you"],
    responses:["I was built by a developer using plain HTML and JavaScript! 💻","A developer created me using simple pattern matching, no fancy AI service needed!","I was handcrafted in HTML, CSS and JavaScript. Open source and free!"] },

  { tag:"age", patterns:["how old are you","what is your age","when were you born","your age","how long have you existed"],
    responses:["I was just created, very fresh and new! 🆕","Age is just a number for a chatbot! I am always learning."] },

  { tag:"help", patterns:["help","what can you do","capabilities","commands","options","what do you know","topics","what can i ask","guide","menu"],

  { tag:"cannotdo", patterns:["can you browse","can you search","can you access internet","are you connected","real time","live data","current news","latest news"],
    responses:["I run fully offline so I cannot browse the internet or access live data. For real time info try Google!","No internet connection here. I work purely from built in knowledge. Check Google for live updates!"] },

  // TIME AND DATE
  { tag:"time", patterns:["what time is it","current time","tell me the time","what is the time now","time please","whats the time"],
    responses:["__TIME__"] },

  { tag:"date", patterns:["what is todays date","what day is it","current date","todays date","what month is it","what year is it","what is today"],

  { tag:"math", patterns:["calculate","math problem","solve","what is 2 plus 2","addition","subtraction","multiplication","division","percentage","compute"],

  { tag:"movies", patterns:["recommend a movie","good movie","movie suggestion","what movie should i watch","best movies","movies to watch","film recommendation","what to watch","popular movies"],
    responses:[
      "🎬 Try Inception (2010), a mind bending thriller you will love!",

  { tag:"music", patterns:["recommend music","good song","music suggestion","what should i listen to","best songs","music recommendation","songs to listen","popular songs","what music"],

  { tag:"sports", patterns:["do you like sports","favourite sport","best sport","talk about sports","football","cricket","basketball","tennis","soccer","sport"],

      "🏏 Cricket is massive in India. Do you follow the IPL?",

      "Sports bring people together! What is your favourite sport?"

  { tag:"games", patterns:["recommend a game","best games","video games","gaming","what game should i play","popular games","game recommendation","pc games","mobile games"],
    responses:[
      "🎮 For PC: Minecraft, GTA V, Cyberpunk 2077 and Elden Ring are incredible!",

  { tag:"books", patterns:["recommend a book","best books","what book should i read","book suggestion","good books","books to read","reading recommendation"],
    responses:[

  // KNOWLEDGE
  { tag:"science", patterns:["tell me about science","science fact","what is gravity","speed of light","what is dna","atoms","physics","chemistry","biology","scientific"],

// ENGINE
function normalize(text) {
  return text.toLowerCase().replace(/[^\w\s]/g,"").trim().replace(/\s+/g," ");
}
function similarity(a,b) {
  const sA=new Set(a.split(" ").filter(Boolean));
  const sB=new Set(b.split(" ").filter(Boolean));
  const inter=[...sA].filter(t=>sB.has(t)).length;
  const union=new Set([...sA,...sB]).size;
  return union===0?0:inter/union;
}
function tryMath(text) {
  const expr=text.replace(/[^0-9+\-*/.() ]/g,"").trim();
  if(expr.length<3) return null;
  try {
    const r=Function('"use strict";return('+expr+')')();
    if(typeof r==="number"&&isFinite(r)) return "🔢 The answer is: <strong>"+r+"</strong>";
  } catch(e){}
  return null;
}
function classify(text) {
  const norm=normalize(text);
  let best=null,bestScore=0;
  for(const intent of intents){
    if(intent.tag==="fallback") continue;
    for(const p of intent.patterns){
      const score=similarity(norm,normalize(p));
      if(score>bestScore){bestScore=score;best=intent;}
    }
  }
  return(!best||bestScore<0.22)?intents.find(i=>i.tag==="fallback"):best;
}
function getResponse(text) {
  const math=tryMath(text);
  if(math) return math;
  const intent=classify(text);
  let r=intent.responses[Math.floor(Math.random()*intent.responses.length)];
  if(r==="__TIME__") return "⏰ The current time is: <strong>"+new Date().toLocaleTimeString()+"</strong>";
  if(r==="__DATE__") return "📅 Today is: <strong>"+new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})+"</strong>";
  return r;
}

// UI
function appendMessage(html,sender){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className="msg "+sender;
  div.innerHTML=html;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}
function showTyping(){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className="msg typing";
  div.id="typing";
  div.textContent="AI is typing...";
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){
  const t=document.getElementById("typing");
  if(t) t.remove();
}
function handleSend(){
  const input=document.getElementById("userInput");
  const text=input.value.trim();
  if(!text) return;
  appendMessage(text,"user");
  input.value="";
  input.focus();
  showTyping();
  setTimeout(()=>{removeTyping();appendMessage(getResponse(text),"bot");},500);
}
function quickSend(text){
  document.getElementById("userInput").value=text;
  handleSend();
}
document.getElementById("sendBtn").addEventListener("click",handleSend);
document.getElementById("userInput").addEventListener("keypress",e=>{if(e.key==="Enter") handleSend();});
