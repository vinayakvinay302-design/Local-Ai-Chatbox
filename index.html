<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local AI Chatbot</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    background: #f4f4f4;
    padding: 0 16px;
  }
  h2 { color: #333; }
  #chat {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    height: 420px;
    overflow-y: auto;
    border: 1px solid #ddd;
    margin-bottom: 10px;
  }
  .msg {
    margin: 8px 0;
    padding: 10px 14px;
    border-radius: 8px;
    max-width: 80%;
    word-wrap: break-word;
    font-size: 14px;
    line-height: 1.4;
  }
  .user { background: #daf1da; margin-left: auto; text-align: right; }
  .bot  { background: #eeeeee; }
  #inputRow { display: flex; gap: 8px; }
  #userInput {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
  #sendBtn {
    padding: 10px 18px;
    border: none;
    background: #4CAF50;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
  }
  #sendBtn:hover { background: #43a047; }
</style>
</head>
<body>

<h2>🤖 Local AI Chatbot</h2>
<div id="chat">
  <div class="msg bot">Hello! I'm ready to chat. Type <strong>help</strong> to see what I can answer!</div>
</div>
<div id="inputRow">
  <input type="text" id="userInput" placeholder="Type a message and press Enter..." autofocus />
  <button id="sendBtn">Send</button>
</div>

  {
    tag: "howareyou",
    patterns: ["how are you", "how are you doing", "how do you do", "you good", "are you okay", "hows it going"],
    responses: ["I'm doing great, thanks for asking!", "I'm just a bot but I'm feeling fantastic!", "All good on my end! How about you?"]
  },
  {
    tag: "goodbye",
    patterns: ["bye", "goodbye", "see you", "see ya", "talk later", "exit", "quit", "cya", "later", "farewell"],
    responses: ["Goodbye! Have a great day.", "See you later!", "Bye! Come back anytime.", "Take care! 👋"]
  },
  {

    patterns: ["thanks", "thank you", "appreciate it", "thx", "thank u", "much appreciated", "ty", "cheers"],
    responses: ["You're welcome!", "Anytime!", "Glad I could help.", "No problem at all!", "Happy to help! 😊"]

  {

    patterns: ["what is your name", "who are you", "what should i call you", "your name", "whats your name", "tell me your name"],
    responses: ["I'm LocalBot, your offline AI chatbot!", "You can call me LocalBot.", "I'm LocalBot — running fully offline, no API needed!"]

    ]
  },
  {
    tag: "sports",

    patterns: ["what is the weather", "weather today", "is it raining", "temperature outside", "will it rain"],
    responses: ["I run fully offline so I can't check live weather. Try a weather app or Google!", "No internet access here — check weather.com or your phone for the latest forecast!"]

  {

    patterns: ["what time is it", "current time", "tell me the time", "what is the time now"],

  {

    patterns: ["what is todays date", "what day is it", "current date", "todays date", "what month is it"],

  {

  // ── Tech & Coding ───────────────────────────────────────
  {
    tag: "coding",
    patterns: ["teach me coding", "how to code", "learn programming", "best programming language", "what is python", "coding tips"],
    responses: [
      "Python is great for beginners — it's simple and very powerful! 🐍",
      "To learn coding, start with HTML/CSS for web, then move to JavaScript!",
      "JavaScript is the language of the web — you're already using it in this chatbot!",
      "Free resources to learn coding: freeCodeCamp, Khan Academy, and MDN Docs!"
    ]
  },
  {
    tag: "ai",
    patterns: ["what is ai", "artificial intelligence", "machine learning", "what is chatgpt", "tell me about ai"],
    responses: [
      "AI stands for Artificial Intelligence — machines designed to simulate human thinking!",
      "Machine Learning is a type of AI where computers learn from data without being explicitly programmed.",
      "ChatGPT is an AI chatbot made by OpenAI that uses a large language model to generate responses.",
      "I'm a simpler rule-based AI — no neural networks, just pattern matching!"
    ]
  },
  {
    tag: "internet",
    patterns: ["what is the internet", "how does internet work", "who invented internet", "www"],
    responses: [
      "The internet is a global network of connected computers sharing information!",
      "Tim Berners-Lee invented the World Wide Web (WWW) in 1989!",
      "The internet works by sending data in small packets between devices using protocols like TCP/IP."
    ]
  },

  // ── Health & Lifestyle ──────────────────────────────────
  {
    tag: "health",
    patterns: ["health tips", "how to stay healthy", "fitness tips", "exercise", "healthy lifestyle", "lose weight"],
    responses: [
      "Drink at least 8 glasses of water a day to stay hydrated! 💧",
      "Exercise for at least 30 minutes a day — even a brisk walk counts!",

    ]
  },
  {

    patterns: ["recommend food", "what should i eat", "healthy food", "favourite food", "best food", "recipe"],
    responses: [
      "Biryani is one of the most loved dishes in India! 🍛",

    ]

    responses: [

  // ── Motivation & Mindset ────────────────────────────────
  {
    tag: "motivation",
    patterns: ["motivate me", "i need motivation", "inspire me", "give me a quote", "feeling lazy", "encouragement"],
    responses: [
      "\"The secret of getting ahead is getting started.\" – Mark Twain 🚀",
      "\"It does not matter how slowly you go as long as you do not stop.\" – Confucius",
      "You've got this! Every expert was once a beginner. Keep going! 💪",
      "\"Success is not final, failure is not fatal: it is the courage to continue that counts.\" – Churchill"
    ]
  },
  {
    tag: "sad",
    patterns: ["i am sad", "feeling down", "i feel lonely", "im depressed", "not feeling well", "bad day"],
    responses: [

      "It's okay to feel sad sometimes. Talk to someone you trust — it really helps!",
      "You matter and things will get better. Take it one day at a time. 🌟",

    ]
  },
  {
    tag: "happy",
    patterns: ["i am happy", "feeling great", "good mood", "im excited", "great day", "feeling awesome"],
    responses: [

      "Love to hear it! What's making your day great?",

      "Awesome! Share that good energy with the world!"

  // ── Travel ──────────────────────────────────────────────
  {
    tag: "travel",
    patterns: ["travel tips", "where should i travel", "best places to visit", "recommend a place", "travel destination"],
    responses: [
      "India has incredible destinations — Goa, Kerala, Rajasthan, Manali are must-visits! 🇮🇳",
      "For international travel, try Japan for a mix of culture and technology! 🇯🇵",

      "For adventure travel, try trekking in Nepal or safari in Kenya!"
    ]
  },

  // ── Fallback ────────────────────────────────────────────
  {
    tag: "fallback",
    patterns: [],
    responses: [
      "I'm not sure I understand. Could you rephrase that?",
      "Sorry, I don't have an answer for that yet. Type 'help' to see what I can do!",
      "Hmm, I didn't quite get that. Try asking something else!",
      "I'm still learning! That one's tricky — try rephrasing or type 'help'."

// ── Engine ──────────────────────────────────────────────
function normalize(text) {
  return text.toLowerCase().replace(/[^\w\s]/g, "").trim().replace(/\s+/g, " ");
}

function similarity(a, b) {
  const setA = new Set(a.split(" ").filter(Boolean));
  const setB = new Set(b.split(" ").filter(Boolean));
  const intersection = [...setA].filter(t => setB.has(t)).length;
  const union = new Set([...setA, ...setB]).size;
  return union === 0 ? 0 : intersection / union;
}

function tryMath(text) {
  const expr = text.replace(/[^0-9+\-*/.() ]/g, "").trim();
  if (!expr) return null;
  try {
    const result = Function('"use strict"; return (' + expr + ')')();
    if (typeof result === "number" && isFinite(result)) return "The answer is: " + result;
  } catch(e) {}
  return null;
}

function classify(text) {
  const normalized = normalize(text);
  let bestIntent = null;
  let bestScore = 0;

  for (const intent of intents) {
    if (intent.tag === "fallback") continue;
    for (const pattern of intent.patterns) {
      const score = similarity(normalized, normalize(pattern));
      if (score > bestScore) {
        bestScore = score;
        bestIntent = intent;
      }
    }
  }

  return (!bestIntent || bestScore < 0.25)
    ? intents.find(i => i.tag === "fallback")
    : bestIntent;
}

function getResponse(text) {
  // Try math first
  const mathResult = tryMath(text);
  if (mathResult) return mathResult;

  const intent = classify(text);
  let response = intent.responses[Math.floor(Math.random() * intent.responses.length)];

  // Replace time/date placeholders
  if (response === "__TIME__") {
    return "The current time is: " + new Date().toLocaleTimeString() + " ⏰";
  }
  if (response === "__DATE__") {
    return "Today is: " + new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + " 📅";
  }
  return response;
}

// ── UI ──────────────────────────────────────────────────
function appendMessage(text, sender) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function handleSend() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  appendMessage(text, "user");
  setTimeout(() => appendMessage(getResponse(text), "bot"), 300);
  input.value = "";
  input.focus();
}

document.getElementById("sendBtn").addEventListener("click", handleSend);
document.getElementById("userInput").addEventListener("keypress", e => {
  if (e.key === "Enter") handleSend();
});
</script>

</body>
</html>
