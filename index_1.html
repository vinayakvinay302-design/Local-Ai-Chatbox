<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local AI Chatbot</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    background: #f4f4f4;
    padding: 0 16px;
  }
  h2 { margin-bottom: 4px; }
  #status {
    font-size: 13px;
    margin-bottom: 12px;
    color: #888;
  }
  #status.ok { color: #2e7d32; }
  #status.error { color: #c62828; }
  #chat {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    height: 400px;
    overflow-y: auto;
    border: 1px solid #ddd;
  }
  .msg {
    margin: 8px 0;
    padding: 8px 12px;
    border-radius: 6px;
    max-width: 80%;
    word-wrap: break-word;
  }
  .user { background: #daf1da; margin-left: auto; text-align: right; }
  .bot { background: #eee; }
  #inputRow { display: flex; margin-top: 10px; }
  #userInput {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
  #sendBtn {
    padding: 10px 16px;
    margin-left: 8px;
    border: none;
    background: #4CAF50;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  #sendBtn:disabled { background: #aaa; cursor: not-allowed; }
</style>
</head>
<body>
  <h2>Local AI Chatbot (offline, rule-based)</h2>
  <div id="status">Loading intents...</div>
  <div id="chat"></div>
  <div id="inputRow">
    <input type="text" id="userInput" placeholder="Type a message..." disabled />
    <button id="sendBtn" disabled>Send</button>
  </div>

  <script src="chatbot.js"></script>
</body>
</html>
